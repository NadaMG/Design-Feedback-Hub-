<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Feedback Hub — Where Great Design Gets Better</title>
  <meta name="description" content="A professional platform for designers to upload their work and receive structured, meaningful feedback from the community." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <!-- NAV -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo" id="nav-logo-btn">
        <div class="logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <span class="logo-text">Design<span class="logo-accent">Hub</span></span>
      </a>

      <div class="nav-links" id="nav-links">
        <a href="#" class="nav-link" id="nav-explore">Explore</a>
        <a href="#" class="nav-link" id="nav-upload-btn" style="display:none">Upload Design</a>
        <a href="#" class="nav-link" id="nav-dashboard-btn" style="display:none">Dashboard</a>
      </div>

      <div class="nav-actions">
        <div class="notification-btn" id="notification-btn" style="display:none">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge" id="notif-badge" style="display:none">0</span>
        </div>
        <div class="user-menu" id="user-menu" style="display:none">
          <div class="user-avatar-nav" id="user-avatar-nav">
            <span id="user-initials">U</span>
          </div>
          <div class="user-dropdown" id="user-dropdown">
            <div class="dropdown-header">
              <span id="dropdown-name">User</span>
              <span class="dropdown-level" id="dropdown-level">Beginner</span>
            </div>
            <a href="#" class="dropdown-item" id="dropdown-profile">My Profile</a>
            <a href="#" class="dropdown-item" id="dropdown-dashboard">Dashboard</a>
            <div class="dropdown-divider"></div>
            <a href="#" class="dropdown-item danger" id="logout-btn">Sign Out</a>
          </div>
        </div>
        <div class="auth-buttons" id="auth-buttons">
          <button class="btn btn-ghost" id="login-nav-btn">Sign In</button>
          <button class="btn btn-primary" id="register-nav-btn">Join Free</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN APP -->
  <main id="app">
    <!-- Pages are rendered here by JS -->
  </main>

  <!-- MODALS -->
  <div class="modal-overlay" id="modal-overlay"></div>

  <!-- Auth Modal -->
  <div class="modal" id="auth-modal">
    <div class="modal-header">
      <h2 id="auth-modal-title">Sign In</h2>
      <button class="modal-close" id="auth-modal-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="auth-modal-body"></div>
  </div>

  <!-- Upload Modal -->
  <div class="modal modal-lg" id="upload-modal">
    <div class="modal-header">
      <h2>Upload Your Design</h2>
      <button class="modal-close" id="upload-modal-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="upload-modal-body"></div>
  </div>

  <!-- Feedback Modal -->
  <div class="modal modal-lg" id="feedback-modal">
    <div class="modal-header">
      <h2>Leave Structured Feedback</h2>
      <button class="modal-close" id="feedback-modal-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="feedback-modal-body"></div>
  </div>

  <!-- Notification Panel -->
  <div class="notif-panel" id="notif-panel">
    <div class="notif-panel-header">
      <h3>Notifications</h3>
      <button class="notif-read-all" id="notif-read-all">Mark all read</button>
    </div>
    <div class="notif-list" id="notif-list">
      <div class="notif-empty">No notifications yet</div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/app.js"></script>
</body>
</html>
